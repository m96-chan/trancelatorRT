name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libasound2-dev cmake

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Tauri CLI
        run: npm ci

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias trancelatorrt \
            -storepass trancelatorrt \
            -keypass trancelatorrt \
            -dname "CN=trancelatorRT, O=m96-chan"

      - name: Initialize Android project
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android init

      - name: Add Android permissions
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />|' "$MANIFEST"

      - name: Build Android APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          npx tauri android build --apk --target aarch64

      - name: Sign APK
        run: |
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            exit 1
          fi

          BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)"

          # Align
          "${BUILD_TOOLS_DIR}/zipalign" -v 4 "$APK_PATH" trancelatorRT-aligned.apk

          # Sign
          "${BUILD_TOOLS_DIR}/apksigner" sign \
            --ks release.jks \
            --ks-pass pass:trancelatorrt \
            --ks-key-alias trancelatorrt \
            --key-pass pass:trancelatorrt \
            --out trancelatorRT-${{ github.ref_name }}-release.apk \
            trancelatorRT-aligned.apk

          # Verify
          "${BUILD_TOOLS_DIR}/apksigner" verify \
            trancelatorRT-${{ github.ref_name }}-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: trancelatorRT-${{ github.ref_name }}-release.apk

  publish-release:
    name: Publish GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Generate release notes
        run: |
          VERSION="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$VERSION" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "${PREV_TAG}..HEAD" | head -20)
          else
            COMMITS=$(git log --oneline -20)
          fi

          cat > release_notes.md << EOF
          ## trancelatorRT ${VERSION}

          ### What's New
          - On-device real-time voice translation
          - Supports: JA, KO, EN, FR, DE, PT, RU, AR
          - Pipeline: Audio → VAD → STT → Translation → TTS → Playback

          ### Changes
          ${COMMITS}

          ### Install
          1. Download the APK file below
          2. Enable "Install from unknown sources" on your Android device
          3. Install the APK
          4. Launch and download required AI models on first run

          ### Requirements
          - Android 8.0+ (API 26)
          - ~2GB free storage for AI models
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: trancelatorRT-${{ github.ref_name }}-release.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
